let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playBeep(duration, freq) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq; osc.type = 'square';
    gain.gain.setValueAtTime(0.8, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration / 1000);
    osc.start(); osc.stop(ctx.currentTime + duration / 1000);
  } catch(e) {}
}
function playVoteSound() { playBeep(1000, 880); }

function setLED(active) {
  const light = document.getElementById('led-light');
  const label = document.getElementById('led-label');
  if (active) { light.classList.add('active'); label.classList.add('active'); label.textContent = 'VOTED'; }
  else { light.classList.remove('active'); label.classList.remove('active'); label.textContent = 'READY'; }
}

function $(id) { return document.getElementById(id); }
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  Object.entries(attrs || {}).forEach(([k, v]) => {
    if (k === 'className') e.className = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else e.setAttribute(k, v);
  });
  children.forEach(c => { if (typeof c === 'string') e.appendChild(document.createTextNode(c)); else if (c) e.appendChild(c); });
  return e;
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  let verifying = false;
  const otpRow = el('div', { id: 'otp-row', style: 'display:flex;gap:10px;justify-content:center;margin-bottom:20px' });
  const otpInputs = [];
  for (let i = 0; i < 6; i++) {
    const inp = el('input', {
      type: 'text', maxLength: 1, id: 'otp-' + i,
      style: 'width:60px;height:72px;font-size:32px;font-weight:800;text-align:center;font-family:monospace;border:3px solid #ccc;border-radius:10px;background:#fff;color:#1a1a2e;margin:0;padding:0;transition:all 0.3s',
      onInput: (e) => {
        if (verifying) return;
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
        if (e.target.value && i < 5) otpInputs[i + 1].focus();
        else if (e.target.value && i === 5) { otpInputs[i].blur(); verifyOTP(); }
      },
      onKeydown: (e) => {
        if (verifying) return;
        if (e.key === 'Backspace' && !e.target.value && i > 0) otpInputs[i - 1].focus();
      }
    });
    otpInputs.push(inp);
    otpRow.appendChild(inp);
  }
  container.appendChild(otpRow);
  mc.appendChild(container);
  setTimeout(() => otpInputs[0].focus(), 100);

  function fallAndReset() {
    verifying = true;
    otpInputs.forEach(inp => inp.disabled = true);
    otpRow.classList.add('otp-shake');
    otpInputs.forEach(inp => inp.style.borderColor = '#e53935');
    setTimeout(() => {
      otpRow.classList.remove('otp-shake');
      otpInputs.forEach(inp => {
        inp.style.transition = 'all 0.4s ease';
        inp.style.transform = 'translateY(120px)';
        inp.style.opacity = '0';
      });
      setTimeout(() => {
        otpInputs.forEach(inp => {
          inp.value = '';
          inp.style.transform = '';
          inp.style.opacity = '';
          inp.style.borderColor = '#ccc';
          inp.disabled = false;
        });
        verifying = false;
        otpInputs[0].focus();
      }, 500);
    }, 400);
  }

  function verifyOTP() {
    if (verifying) return;
    const otp = otpInputs.map(inp => inp.value).join('');
    if (otp.length !== 6) return;
    verifying = true;
    otpInputs.forEach(inp => inp.disabled = true);
    // Accept any 6-digit OTP in mock mode
    currentPositionIndex = 0;
    votedPositions = [];
    renderPosition();
  }
}

function renderPosition() {
  const mc = $('main-content');
  mc.innerHTML = '';

  if (currentPositionIndex >= POSITIONS.length) { showThankYou(); return; }

  const pos = POSITIONS[currentPositionIndex];
  setLED(false);

  mc.appendChild(el('div', { className: 'position-header' },
    el('h2', {}, pos.title),
    el('p', {}, 'Position ' + (currentPositionIndex + 1) + ' of ' + POSITIONS.length)
  ));

  const list = el('div', { className: 'candidate-list' });

  const regular = pos.candidates.filter(c => !c.is_nota);
  regular.forEach(c => {
    const symbolChar = SYMBOLS[c.symbol] || '\u2605';
    const card = el('div', { className: 'candidate-card', onClick: () => castVoteFor(c) });
    card.innerHTML =
      '<div class="candidate-serial">' + (c.serial || '') + '</div>' +
      '<img class="candidate-photo" src="/uploads/photos/0.jpg" onerror="this.style.display=\'none\'">' +
      '<div class="candidate-name-wrap">' +
        '<span class="candidate-name">' + esc(c.name) + '</span>' +
        (c.name_kn ? '<span class="candidate-name-sep"> / </span><span class="candidate-name-kn">' + esc(c.name_kn) + '</span>' : '') +
      '</div>' +
      '<div class="candidate-symbol">' + symbolChar + '</div>';
    list.appendChild(card);
  });

  const nota = pos.candidates.filter(c => c.is_nota);
  if (nota.length > 0) {
    const card = el('div', { className: 'candidate-card nota-card', onClick: () => castVoteFor(nota[0]) });
    card.innerHTML =
      '<div class="candidate-serial" style="color:#ff9800">\u2717</div>' +
      '<div class="candidate-photo-placeholder" style="background:#e8eaf6;color:#666;font-size:11px;font-weight:800">NOTA</div>' +
      '<div class="candidate-name-wrap">' +
        '<span class="candidate-name" style="color:#ff9800">NOTA</span>' +
        '<span class="candidate-name-sep"> / </span>' +
        '<span class="candidate-name-kn">\u0CAE\u0CC7\u0CB2\u0CBF\u0CA8 \u0CAF\u0CBE\u0CB5\u0CC1\u0CA6\u0CC2 \u0C85\u0CB2\u0CCD\u0CB2</span>' +
      '</div>' +
      '<div class="candidate-symbol" style="background:#e8eaf6;color:#666;font-size:11px;font-weight:800">\u2014</div>';
    list.appendChild(card);
  }

  mc.appendChild(list);
}

let voteInProgress = false;
function castVoteFor(candidate) {
  if (voteInProgress) return;
  voteInProgress = true;
  setLED(true);
  playVoteSound();

  votedPositions.push({ position: POSITIONS[currentPositionIndex].title, candidate: candidate.name });

  setTimeout(() => {
    voteInProgress = false;
    currentPositionIndex++;
    renderPosition();
  }, 1500);
}

function showThankYou() {
  const mc = $('main-content');
  mc.innerHTML = '';
  setLED(false);
  document.getElementById('led-label').textContent = 'DONE';
  playBeep(4800, 660);

  let summary = '<div class="thank-you">' +
    '<div class="icon">\u2705</div>' +
    '<h1>Thank You!</h1>' +
    '<p>This is a mock vote. Nothing has been recorded.</p>';

  if (votedPositions.length > 0) {
    summary += '<div style="margin-top:20px;text-align:left;background:#fff;border:1px solid #e0e0e0;border-radius:12px;padding:16px">';
    votedPositions.forEach(v => {
      summary += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;font-size:13px">' +
        '<span style="color:#666">' + v.position + '</span><span style="font-weight:600">' + v.candidate + '</span></div>';
    });
    summary += '</div>';
  }

  summary += '<p style="margin-top:24px;font-size:12px;color:#666">Next voter ready in 5 seconds...</p></div>';
  mc.innerHTML = summary;

  setTimeout(() => {
    setLED(false);
    document.getElementById('led-label').textContent = 'READY';
    checkMockElection();
  }, 5000);
}

async function checkMockElection() {
  try {
    const res = await fetch('/api/elections');
    const elections = await res.json();
    const activeMock = elections.find(e => e.is_mock && e.status === 'active');
    if (!activeMock) {
      const mc = $('main-content');
      mc.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:0;padding:20px;text-align:center">' +
        '<div style="font-size:64px;margin-bottom:16px">🗳️</div>' +
        '<h2 style="color:#f57f17;margin-bottom:8px">No Active Mock Election</h2>' +
        '<p style="color:#666;font-size:14px">Please ask the administrator to activate a mock election.</p>' +
        '<p style="color:#999;font-size:12px;margin-top:16px">This page will refresh automatically...</p></div>';
      setTimeout(() => checkMockElection(), 5000);
      return;
    }
  } catch (e) {
    const mc = $('main-content');
    mc.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:0;padding:20px;text-align:center">' +
      '<div style="font-size:64px;margin-bottom:16px">⚠️</div>' +
      '<h2 style="color:#f57f17;margin-bottom:8px">Connection Error</h2>' +
      '<p style="color:#666;font-size:14px">Cannot reach the server.</p>' +
      '<p style="color:#999;font-size:12px;margin-top:16px">Retrying in 5 seconds...</p></div>';
    setTimeout(() => checkMockElection(), 5000);
    return;
  }
  showOTPEntry();
}

checkMockElection();
</script>
